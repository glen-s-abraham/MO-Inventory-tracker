<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<!-- ============ HEAD FRAGMENT ============ -->
<head th:fragment="head(title)">
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title th:text="${title} + ' | Inventory Tracker'">Inventory Tracker</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet"
          crossorigin="anonymous"/>

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
          rel="stylesheet"/>

    <!-- Custom styles (optional, add your own later) -->
    <link th:href="@{/css/style.css}" rel="stylesheet"/>
</head>

<!-- ============ NAVBAR FRAGMENT ============ -->
<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container-fluid">
        <a class="navbar-brand" th:href="@{/}">
            <i class="bi bi-box-seam me-2"></i>Inventory Tracker
        </a>
        <button class="navbar-toggler" type="button"
                data-bs-toggle="collapse" data-bs-target="#mainNav"
                aria-controls="mainNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mainNav">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link" th:classappend="${activePage == 'dashboard' ? 'active' : ''}" aria-current="page" th:href="@{/}">
                        <i class="bi bi-speedometer2 me-1"></i>Dashboard
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:classappend="${activePage == 'inventory' ? 'active' : ''}" th:href="@{/inventory}">
                        <i class="bi bi-warehouse me-1"></i>Inventory
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:classappend="${activePage == 'settings' ? 'active' : ''}" th:href="@{/settings}">
                        <i class="bi bi-gear me-1"></i>Settings
                    </a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<!-- ============ FOOTER FRAGMENT ============ -->
<footer th:fragment="footer" class="footer mt-auto py-3 bg-light">
    <div class="container text-center">
        <span class="text-muted">&copy; 2026 Maria's Organics — Inventory Tracker</span>
    </div>
</footer>

<!-- ============ SCRIPTS FRAGMENT ============ -->
<div th:fragment="scripts">
    <!-- Bootstrap 5 JS Bundle (includes Popper) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
            crossorigin="anonymous"></script>
</div>

</html>
