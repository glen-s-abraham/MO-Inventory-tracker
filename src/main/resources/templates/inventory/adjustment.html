<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(${pageTitle})}"></head>
<body class="d-flex flex-column min-vh-100">

    <nav th:replace="~{fragments/layout :: navbar}"></nav>

    <main class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow border-0">
                    <div class="card-header bg-warning text-dark">
                        <h4 class="mb-0"><i class="bi bi-pencil-square me-2"></i>Manual Stock Adjustment</h4>
                    </div>
                    <div class="card-body p-4">
                        <div class="alert alert-info py-2">
                            <i class="bi bi-info-circle me-2"></i>Use this to log wastage, damage, or correction.
                        </div>
                        
                        <form th:action="@{/inventory/adjustment}" method="post">
                            <div class="mb-3">
                                <label for="itemName" class="form-label">Item Type</label>
                                <select class="form-select" id="itemName" name="itemName" required>
                                    <option value="PELLETS">Pellets (kg)</option>
                                    <option value="SPAWN">Spawn (g)</option>
                                </select>
                            </div>
                            
                            <div class="mb-3">
                                <label for="quantity" class="form-label">Loss Quantity (to subtract)</label>
                                <input type="number" step="0.1" class="form-control" id="quantity" name="quantity" required min="0.1">
                            </div>

                            <div class="mb-4">
                                <label for="reason" class="form-label">Reason</label>
                                <input type="text" class="form-control" id="reason" name="reason" required placeholder="e.g. 5kg pellets spoiled">
                            </div>

                            <div class="d-grid gap-2">
                                <button type="submit" class="btn btn-warning">
                                    <i class="bi bi-save me-1"></i>Save Adjustment
                                </button>
                                <a th:href="@{/inventory}" class="btn btn-outline-secondary">Cancel</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer th:replace="~{fragments/layout :: footer}"></footer>
    <div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
