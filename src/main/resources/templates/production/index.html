<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(title='Production Tracking')}"></head>
<body class="bg-light">

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container py-4">
    <div class="row">
        <!-- Production Entry Form -->
        <div class="col-md-4">
            <div class="card shadow-sm mb-4">
                <div class="card-header bg-primary text-white">
                    <h5 class="card-title mb-0"><i class="bi bi-plus-circle me-2"></i>Log Daily Inoculation</h5>
                </div>
                <div class="card-body">
                    <div th:if="${successMessage}" class="alert alert-success" role="alert" th:text="${successMessage}"></div>
                    <div th:if="${errorMessage}" class="alert alert-danger" role="alert" th:text="${errorMessage}"></div>

                    <form th:action="@{/production/log}" method="post">
                        <div class="mb-3">
                            <label for="inoculationDate" class="form-label">Inoculation Date</label>
                            <input type="date" class="form-control" id="inoculationDate" name="inoculationDate" 
                                   th:value="${today}" required>
                            <div class="form-text">You can back-date to "Yesterday" if needed.</div>
                        </div>
                        <div class="mb-3">
                            <label for="bagCount" class="form-label">Number of Bags</label>
                            <input type="number" class="form-control" id="bagCount" name="bagCount" min="1" step="1" required>
                        </div>
                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-save me-1"></i>Log Production
                            </button>
                        </div>
                    </form>
                </div>
            </div>

            <!-- Stats / Occupancy Info -->
            <div class="card shadow-sm">
                <div class="card-header bg-dark text-white">
                    <h5 class="card-title mb-0"><i class="bi bi-info-circle me-2"></i>Factory Status</h5>
                </div>
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-center mb-2">
                        <span>Active Bags:</span>
                        <span class="badge bg-info text-dark" th:text="${#aggregates.sum(activeBatches.![bagCount]) ?: 0}">0</span>
                    </div>
                    <div class="progress" style="height: 10px;">
                        <th:block th:with="totalActive=${#aggregates.sum(activeBatches.![bagCount]) ?: 0}">
                            <div class="progress-bar" role="progressbar" 
                                 th:style="'width: ' + (${totalActive} / ${capacity} * 100) + '%'"
                                 th:aria-valuenow="${totalActive}" aria-valuemin="0" th:aria-valuemax="${capacity}"></div>
                        </th:block>
                    </div>
                </div>
            </div>
        </div>

        <!-- Batch List -->
        <div class="col-md-8">
            <div class="card shadow-sm">
                <div class="card-header bg-white d-flex justify-content-between align-items-center">
                    <h5 class="card-title mb-0 text-primary"><i class="bi bi-list-task me-2"></i>Production Batches</h5>
                    <span class="badge bg-secondary" th:text="${batches.size()} + ' Total Batches'">0</span>
                </div>
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover mb-0">
                            <thead class="table-light">
                                <tr>
                                    <th>Batch ID</th>
                                    <th>Inoculation Date</th>
                                    <th>Bags</th>
                                    <th>Target Exit Date</th>
                                    <th>Status</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="batch : ${batches}">
                                    <td class="fw-bold" th:text="${batch.batchId}">B-20260314-001</td>
                                    <td th:text="${batch.inoculationDate}">2026-03-14</td>
                                    <td th:text="${batch.bagCount}">18</td>
                                    <td th:text="${batch.targetExitDate}">2026-04-01</td>
                                    <td>
                                        <span class="badge" 
                                              th:classappend="${batch.status.name() == 'ACTIVE' ? 'bg-success' : 'bg-secondary'}"
                                              th:text="${batch.status}">ACTIVE</span>
                                    </td>
                                </tr>
                                <tr th:if="${batches.isEmpty()}">
                                    <td colspan="5" class="text-center py-4 text-muted">
                                        No production batches logged yet.
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<div th:replace="~{fragments/layout :: scripts}"></div>

</body>
</html>
